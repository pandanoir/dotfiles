name: Update Neovim Screenshot

on:
  push:
    branches:
      - master
    paths:
      - "nvim/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: sudo apt update && sudo apt install -y ripgrep ffmpeg imagemagick ttyd
      - name: Install Nerd Font
        run: |
          mkdir -p ~/.local/share/fonts
          curl -fLo /tmp/HackNerdFont.zip https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Hack.zip
          unzip /tmp/HackNerdFont.zip -d ~/.local/share/fonts
          fc-cache -fv
      - name: Setup dotfiles
        run: |
          ln -sf ${GITHUB_WORKSPACE} $HOME/dotfiles
          ${GITHUB_WORKSPACE}/install.sh
          CI=true nvim --headless "+Lazy! sync" +qa 2>/dev/null || true
          CI=true nvim --headless "+TSUpdateSync" +qa 2>/dev/null || true
      - name: Save old screenshots
        run: |
          cp assets/nvim-startup.png /tmp/nvim-startup-old.png 2>/dev/null || true
          cp assets/nvim-screenshot.png /tmp/nvim-screenshot-old.png 2>/dev/null || true
      - name: Install VHS
        run: go install github.com/charmbracelet/vhs@latest
      - name: Run VHS
        run: |
          export PATH="$HOME/go/bin:$PATH"
          vhs .github/nvim-screenshot.tape
      - name: Resize screenshots
        run: mogrify -resize 1200x assets/nvim-startup.png assets/nvim-screenshot.png
      - name: Commit and push changed screenshots
        run: |
          changed=()
          for img in nvim-startup nvim-screenshot; do
            if ! compare -metric AE "assets/${img}.png" "/tmp/${img}-old.png" /dev/null 2>/dev/null; then
              changed+=("assets/${img}.png")
            fi
          done
          if [ ${#changed[@]} -eq 0 ]; then
            echo "Screenshots unchanged, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${changed[@]}"
          git commit -m "docs: update neovim screenshot" && git push
