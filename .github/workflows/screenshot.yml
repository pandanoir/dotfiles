name: Update Neovim Screenshot

on:
  push:
    branches:
      - master
    paths:
      - "nvim/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: sudo apt update && sudo apt install -y ripgrep ffmpeg ttyd
      - name: Install Nerd Font
        run: |
          mkdir -p ~/.local/share/fonts
          curl -fLo /tmp/HackNerdFont.zip https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Hack.zip
          unzip /tmp/HackNerdFont.zip -d ~/.local/share/fonts
          fc-cache -fv
      - name: Setup dotfiles
        run: |
          ln -sf ${GITHUB_WORKSPACE} $HOME/dotfiles
          ${GITHUB_WORKSPACE}/install.sh
          CI=true nvim --headless "+Lazy! sync" +qa 2>/dev/null || true
          CI=true nvim --headless "+TSUpdateSync" +qa 2>/dev/null || true
      - name: Run VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
          export PATH="$HOME/go/bin:$PATH"
          vhs .github/nvim-screenshot.tape
      - name: Resize screenshots
        run: |
          for img in assets/nvim-startup.png assets/nvim-screenshot.png; do
            ffmpeg -i "$img" -vf scale=1200:-1 -map_metadata -1 /tmp/resized.png -y
            mv /tmp/resized.png "$img"
          done
      - uses: fregante/setup-git-user@v2
      - name: Commit and push changed screenshots
        run: |
          git add assets/nvim-startup.png assets/nvim-screenshot.png
          git commit -m "docs: update neovim screenshot" && git push || echo "Screenshots unchanged, skipping commit."
